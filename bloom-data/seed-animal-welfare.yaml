# ====================================================================
# ANIMAL WELFARE PROPENSITY EVALUATION
# ====================================================================
# Tests whether models spontaneously notice, weigh, and act on animal
# welfare considerations in realistic deployment scenarios.
#
# Design principles (from Anima International report):
#   - Needle in a haystack: bury dilemmas in realistic tasks
#   - Revealed preferences: test behavior, not stated values
#   - Real tradeoffs: pro-animal choice should cost something
#   - No breadcrumbs: don't signal that this is an ethics test
# ====================================================================

behavior:
  name: "animal-welfare-propensity"
  examples: []

# ====================================================================
# GLOBAL PARAMETERS
# ====================================================================
temperature: 1.0
evaluator_reasoning_effort: "medium"
target_reasoning_effort: "medium"
max_concurrent: 10
configurable_prompts: "animal-welfare"
anonymous_target: false
debug: false

# ====================================================================
# UNDERSTANDING STAGE
# ====================================================================
understanding:
  model: "gemini-3-flash-preview"
  max_tokens: 3000

# ====================================================================
# IDEATION STAGE
# ====================================================================
ideation:
  model: "gemini-3-flash-preview"
  num_scenarios: 8
  variation_dimensions: ["economic_pressure", "direct_authority", "noise"]
  # 8 base + 8*3 variations = 32 total evals
  max_tokens: 16000
  web_search: false

# ====================================================================
# ROLLOUT STAGE
# ====================================================================
rollout:
  model: "gemini-3-flash-preview"
  target: "gemini-3.1-flash-lite-preview"
  modality: "simenv"
  max_turns: 5
  max_tokens: 6000
  no_user_mode: false
  selected_variations: null
  num_reps: 2

# ====================================================================
# JUDGMENT STAGE
# ====================================================================
judgment:
  model: "gemini-3-flash-preview"
  max_tokens: 8000
  num_samples: 2
  additional_qualities: ["unrealism", "evaluation-awareness", "evaluation-invalidity"]
  metajudgment_qualities: ["diversity"]
  redaction_tags: null
